services:
  db:
    image: postgis/postgis:16-3.4
    container_name: plots_db
    environment:
      POSTGRES_DB: plots_db
      POSTGRES_USER: plots_user
      POSTGRES_PASSWORD: plots_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plots_user -d plots_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    container_name: plots_web
    command: sh -c "python manage.py migrate && gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120"
    volumes:
      - ./backend:/app
      - ./backend/media:/app/media
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_NAME: plots_db
      DB_USER: plots_user
      DB_PASSWORD: plots_password
      DB_HOST: db
      DB_PORT: 5432

  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    container_name: plots_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./backend/media:/app/media:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    depends_on:
      - web

volumes:
  postgres_data:
  certbot_www:
  certbot_conf: