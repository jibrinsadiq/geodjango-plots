<!DOCTYPE html>
<html>
<head>
    <title>Create Plot</title>
</head>
<body>
    <h1>Create Plot</h1>

    {% if messages %}
        {% for message in messages %}
            <p>{{ message }}</p>
        {% endfor %}
    {% endif %}

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Create Plot</button>
    </form>
<p><a href="{% url 'plots:create_plot_by_polygon' %}">Create Plot by Polygon</a></p>
</body>
</html>
