<!DOCTYPE html>
<html>
<head>
    <title>Add Owner</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="strict-origin-when-cross-origin">

    <style>
        :root {
            --bg: #f4f7fb;
            --card: #ffffff;
            --border: #d7e0ea;
            --text: #172033;
            --muted: #5f6b7a;
            --primary: #1d4ed8;
            --primary-dark: #1e40af;
            --secondary-bg: #e8eef6;
            --secondary-text: #1f2937;
            --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
            --shadow-soft: 0 4px 14px rgba(15, 23, 42, 0.06);
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to bottom, #f6f9fc 0%, #eef3f9 100%);
            margin: 0;
            padding: 0;
            color: var(--text);
        }

        .container {
            max-width: 980px;
            margin: 24px auto;
            background: var(--card);
            padding: 22px;
            border-radius: 18px;
            box-shadow: var(--shadow);
            border: 1px solid #e8eef5;
        }

        h1 {
            margin-top: 0;
            margin-bottom: 8px;
            text-align: center;
            color: var(--text);
            font-size: 30px;
            letter-spacing: 0.2px;
        }

        .intro {
            margin: 0 auto 18px auto;
            text-align: center;
            color: var(--muted);
            font-size: 14px;
            line-height: 1.5;
            max-width: 760px;
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .actions a {
            display: inline-block;
            padding: 10px 14px;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 14px;
            box-shadow: var(--shadow-soft);
            transition: 0.2s ease;
        }

        .actions a:hover {
            transform: translateY(-1px);
        }

        .actions a.primary {
            background: var(--primary);
            color: white;
        }

        .actions a.primary:hover {
            background: var(--primary-dark);
        }

        .actions a.secondary {
            background: var(--secondary-bg);
            color: var(--secondary-text);
        }

        .actions a.secondary:hover {
            background: #dbe5f0;
        }

        .messages {
            margin-bottom: 16px;
        }

        .message {
            padding: 10px 12px;
            border-radius: 10px;
            margin-bottom: 8px;
            background: #eef6ff;
            border: 1px solid #cfe3ff;
            color: #1d4e89;
            font-size: 14px;
        }

        .form-card {
            padding: 22px;
            border: 1px solid var(--border);
            border-radius: 16px;
            background: linear-gradient(to bottom, #ffffff 0%, #f9fbfe 100%);
            box-shadow: var(--shadow-soft);
        }

        form p {
            margin-bottom: 14px;
        }

        label {
            display: block;
            font-weight: bold;
            color: var(--text);
            margin-bottom: 5px;
            font-size: 14px;
        }

        input, textarea, select {
            width: 100%;
            max-width: 100%;
            padding: 10px 12px;
            margin-top: 4px;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 14px;
            background: #ffffff;
        }

        input:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #8fb3ff;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.10);
        }

        textarea {
            min-height: 110px;
            resize: vertical;
        }

        input[type="file"] {
            padding: 8px;
            background: #fff;
        }

        input[type="date"] {
            min-height: 42px;
        }

        .errorlist {
            color: #b91c1c;
            margin: 6px 0 0 0;
            font-size: 14px;
        }

        .submit-row {
            margin-top: 18px;
            text-align: center;
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 18px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            box-shadow: var(--shadow-soft);
            transition: 0.2s ease;
        }

        button:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
        }

        @media (max-width: 700px) {
            .container {
                margin: 14px;
                padding: 16px;
            }

            h1 {
                font-size: 24px;
            }

            .actions {
                flex-direction: column;
                align-items: stretch;
            }

            .actions a {
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Add Owner</h1>

        <p class="intro">
            Create a new owner profile and capture the details required for plot assignment, identity records, and future follow-up.
        </p>

        <div class="actions">
            <a href="{% url 'plots:plot_list' %}" class="secondary">Plots Workspace</a>
            <a href="{% url 'plots:owner_list' %}" class="secondary">Owners</a>
        </div>

        {% if messages %}
            <div class="messages">
                {% for message in messages %}
                    <div class="message">{{ message }}</div>
                {% endfor %}
            </div>
        {% endif %}

        <div class="form-card">
            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}
                {{ form.as_p }}

                <div class="submit-row">
                    <button type="submit">Save Owner</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const dobField =
                document.getElementById("id_date_of_birth") ||
                document.getElementById("id_dob") ||
                document.querySelector('input[name="date_of_birth"]') ||
                document.querySelector('input[name="dob"]');

            if (dobField) {
                dobField.type = "date";
                dobField.placeholder = "";
                dobField.max = new Date().toISOString().split("T")[0];
            }
        });
    </script>
</body>
</html>
